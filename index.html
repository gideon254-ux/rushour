<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <link rel="icon" href="/favicon.ico">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>rushour - Premier Academic Resources</title>
    <meta name="description" content="High-quality academic resources, ISP documentation, and revision materials. Instant delivery globally.">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Google Fonts: Inter Tight -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter+Tight:ital,wght@0,400;0,600;0,800;1,400&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">

    <!-- PayPal SDK -->
    <script src="https://www.paypal.com/sdk/js?client-id=AbsiUPJ8ZNu8UMqke1HVoJXBFCRECG9QliyN9o7RexoCNEoCNzZiq3bA-O0Pj5zDdgdfCAuu2mOxJyIk&currency=USD"></script>
    
    <style type="text/tailwindcss">
      @layer theme {
        :root {
          --primary-color: #EA580C;
          --secondary-color: #111827;
        }
        body {
          font-family: 'Inter Tight', sans-serif;
        }
        .font-mono {
          font-family: 'JetBrains Mono', monospace;
        }
      }
      
      @keyframes blob {
        0% { transform: translate(0px, 0px) scale(1); }
        33% { transform: translate(30px, -50px) scale(1.1); }
        66% { transform: translate(-20px, 20px) scale(0.9); }
        100% { transform: translate(0px, 0px) scale(1); }
      }
      .animate-blob {
        animation: blob 7s infinite;
      }
      .animation-delay-2000 {
        animation-delay: 2s;
      }
      .animation-delay-4000 {
        animation-delay: 4s;
      }
      .perspective-1000 {
        perspective: 1000px;
      }
      .preserve-3d {
        transform-style: preserve-3d;
      }
    </style>
  </head>
  <body class="bg-gray-50 text-gray-900 antialiased selection:bg-orange-100 selection:text-orange-900">
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
