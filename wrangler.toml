name = "rushour"
main = "workers/api/index.js"
compatibility_date = "2024-01-01"

# IMPORTANT: You need to create a D1 database in Cloudflare Dashboard first
# Then replace the database_id below with your actual D1 database ID

[[d1_databases]]
binding = "DB"
database_name = "rushour-db"
database_id = "REPLACE_WITH_YOUR_D1_DATABASE_ID"

[vars]
R2_BUCKET_NAME = "rushour-files"
R2_ACCOUNT_ID = "REPLACE_WITH_YOUR_R2_ACCOUNT_ID"
